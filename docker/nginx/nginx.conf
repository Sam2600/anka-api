# nginx vhost for anka-api.kaunghtetsan.com
#
# TLS is terminated here using a Cloudflare Origin Certificate (free, 15-year
# cert generated from the CF dashboard). Cloudflare sits in front as a proxy
# and re-encrypts the leg from CF edge → this nginx in "Full (strict)" SSL mode.
#
# Static files (/public/*) are served directly by nginx.
# Everything else is forwarded to php-fpm at app:9000 via FastCGI.

# Real client IP from Cloudflare's edge.
# Cloudflare IP ranges: https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# 80 → 443 redirect. Cloudflare normally handles this but keep it as a safety net.
server {
    listen 80;
    listen [::]:80;
    server_name anka-api.kaunghtetsan.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name anka-api.kaunghtetsan.com;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Larger uploads (Estimate.xlsx, contract PDFs ≤25MB per migration check).
    client_max_body_size 32m;

    root /var/www/html/public;
    index index.php;

    # Long cache for static assets — vendor/, build/, etc.
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # Pretty-URL rewrites: hand everything that isn't a real file to index.php.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # FastCGI to php-fpm container.
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        # Trust the CF-Forwarded-Proto so Laravel knows requests are HTTPS.
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_read_timeout 120s;
    }

    # Hide dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Laravel's health endpoint — useful for CF/EC2 health checks.
    location = /up {
        try_files $uri /index.php?$query_string;
        access_log off;
    }
}
